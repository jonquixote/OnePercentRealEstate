services:
  app:
    build:
      context: ../
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3001:3000"
    env_file:
      - ../.env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/postgres
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - frontend
      - backend
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  n8n:
    image: n8nio/n8n:1.85.0
    restart: always
    ports:
      - "5678:5678"
    env_file:
      - ../.env
    environment:
      - N8N_HOST=n8n.octavo.press
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD}
      - N8N_USER_MANAGEMENT_DISABLED=false
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - N8N_INITIAL_USER_EMAIL=${N8N_USER_EMAIL}
      - N8N_INITIAL_USER_PASSWORD=${N8N_PASSWORD}
      - N8N_INITIAL_USER_FIRST_NAME=Admin
      - N8N_INITIAL_USER_LAST_NAME=OnePercent
      - NODE_ENV=production
      - WEBHOOK_URL=https://n8n.octavo.press/
      - GENERIC_TIMEZONE=America/New_York
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_PASSWORD=${N8N_PASSWORD}
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - frontend
      - backend
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  postgres:
    image: postgis/postgis:16-3.4-alpine
    restart: always
    env_file:
      - ../.env
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=postgres
    # Wave 0 tuning for a 15GB / 2-core host where PG is the primary tenant.
    # Stock was shared_buffers=128MB, work_mem=4MB, random_page_cost=4 (HDD).
    # 4GB buffers / 10GB effective cache = ~25%/65% rule; random_page_cost
    # 1.1 for SSD; pg_stat_statements feeds the Wave 7 index audit.
    command:
      - postgres
      - -c
      - shared_buffers=4GB
      - -c
      - effective_cache_size=10GB
      - -c
      - work_mem=64MB
      - -c
      - maintenance_work_mem=1GB
      - -c
      - random_page_cost=1.1
      - -c
      - wal_compression=on
      - -c
      - max_wal_size=4GB
      - -c
      - shared_preload_libraries=pg_stat_statements
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../init-scripts:/docker-entrypoint-initdb.d
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          # 4GB shared_buffers + work_mem/maintenance/connection overhead;
          # 6G ceiling leaves headroom. Box is 15G with ~11G free.
          memory: 6G
          cpus: '2'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  scraper:
    build: ../services/scraper_service
    restart: always
    ports:
      - "127.0.0.1:8001:8000"
    env_file:
      - ../.env
    environment:
      - PORT=8000
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/postgres
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:alpine
    restart: always
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 1gb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD}
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  two:
    build:
      context: ../
      dockerfile: apps/two/Dockerfile
    restart: always
    ports:
      - "3002:3000"
    env_file:
      - ../.env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/postgres
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - frontend
      - backend
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Wave 2: crawl-job worker. Subscribes to PG NOTIFY crawl_job_enqueued
  # (trigger added in migration 2026_06_03_crawl_jobs_notify.sql) and
  # processes claimed rows via the FastAPI scraper service. Replaces
  # n8n's 30s polling Cron node; n8n owns scheduling, not draining.
  worker:
    build:
      context: ../
      dockerfile: apps/worker/Dockerfile
    restart: always
    env_file:
      - ../.env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/postgres
      - SCRAPER_URL=http://scraper:8000
      - WORKER_CONCURRENCY=2
      - LOG_LEVEL=info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Wave 2: cluster MV refresher. REFRESH MATERIALIZED VIEW CONCURRENTLY
  # mv_cluster_tiles every 10 min. Same image as `worker`, different CMD.
  worker-refresh:
    build:
      context: ../
      dockerfile: apps/worker/Dockerfile
    restart: always
    env_file:
      - ../.env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/postgres
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - SCRAPER_URL=http://scraper:8000
      - CLUSTER_REFRESH_INTERVAL_MS=600000
      - LOG_LEVEL=info
    command: ["node", "apps/worker/dist/refresh-clusters.js"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Wave 3: async rent estimator. LISTEN rent_job_enqueued, POST to
  # services/ml /predict, write back estimated_rent + rent_model_version
  # + rent_calc_status. Same image as `worker`, different CMD.
  worker-rent:
    build:
      context: ../
      dockerfile: apps/worker/Dockerfile
    restart: always
    env_file:
      - ../.env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/postgres
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - ML_URL=http://ml:8000
      # Wave 0: drain the ~790K backlog. The ML service is a single-uvicorn
      # sync-triangulation process — its per-prediction cost (comps DB scan
      # + CPU) is the bottleneck, not the worker. Concurrency 8 saturated it
      # (2G OOM + 30s timeouts, measured). 4 matches ML capacity without
      # timeouts. Real throughput fix is the Wave 2 batch-scoring path.
      - RENT_BACKFILL_BATCH=200
      - RENT_WORKER_CONCURRENCY=6
      - RENT_DRAIN_INTERVAL_MS=30000
      - LOG_LEVEL=info
    command: ["node", "apps/worker/dist/rent-estimator.js"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Wave 6: watchlist alerts worker. Every 15 min evaluate watchlists,
  # create alerts for new matches / price drops, send via email (Resend) or
  # webhook. Reads RESEND_API_KEY from .env when channel='email'.
  worker-watchlist-alerts:
    build:
      context: ../
      dockerfile: apps/worker/Dockerfile
    restart: always
    env_file:
      - ../.env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/postgres
      - WATCHLIST_TICK_MS=900000
      - WATCHLIST_FROM_EMAIL=alerts@octavo.press
      - LOG_LEVEL=info
    command: ["node", "apps/worker/dist/watchlist-alerts.js"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Wave 3: rent triangulation FastAPI shim. Imports services/rent_estimator_v2
  # (legacy math) + stamps active rent_models version onto each prediction.
  ml:
    build:
      # Dockerfile copies services/rent_estimator_v2.py and services/ml/ —
      # context must be the repo root so those paths resolve.
      context: ../
      dockerfile: services/ml/Dockerfile
    restart: always
    env_file:
      - ../.env
    environment:
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/postgres
      - ML_PORT=8000
    # 3 uvicorn worker processes: the estimator is sync CPU+DB work, so a
    # single process is GIL-bound (~6s/prediction serialized). 3 processes
    # give real parallelism to drain the backlog. Each caches version +
    # estimator independently (no shared state). Wave 2's batch path
    # supersedes per-row HTTP entirely.
    command:
      - uvicorn
      - services.ml.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --workers
      - "3"
    expose:
      - "8000"
    volumes:
      # Wave 2: model artifacts survive image rebuilds; retrain writes,
      # serving reads.
      - ml_models:/models
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 3G
          cpus: '2'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Wave 7: media health crawler. Checks primary_photo URLs and stamps
  # HTTP status back into listings.media_url_status. Same image as `worker`,
  # different CMD.
  worker-media-health:
    build:
      context: ../
      dockerfile: apps/worker/Dockerfile
    restart: always
    env_file:
      - ../.env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/postgres
      - MEDIA_HEALTH_CONCURRENCY=8
      - MEDIA_HEALTH_INTERVAL_MS=300000
      - LOG_LEVEL=info
    command: ["node", "apps/worker/dist/media-health.js"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: '0.5'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Wave 7: ML scheduler. Runs drift at 02:00 UTC daily and eval at 03:00 UTC
  # on Sundays. POSTs to http://ml:8000/ops/run-* and optionally sends alerts
  # to OPS_WEBHOOK_URL. Same image as `worker`, different CMD.
  worker-ml-scheduler:
    build:
      context: ../
      dockerfile: apps/worker/Dockerfile
    restart: always
    env_file:
      - ../.env
    environment:
      - NODE_ENV=production
      - ML_URL=http://ml:8000
      - LOG_LEVEL=info
    command: ["node", "apps/worker/dist/ml-scheduler.js"]
    depends_on:
      - ml
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  pg_tileserv:
    image: pramsey/pg_tileserv:latest
    restart: always
    env_file:
      - ../.env
    environment:
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@postgres/postgres
    ports:
      - "127.0.0.1:7800:7800"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---- Wave 7 monitoring stack ---------------------------------------------
  # Bring up alongside the existing services. Requires extra env vars in .env
  # (GRAFANA_ADMIN_PASSWORD + ALERTMANAGER_SMTP_*). Alert routing in
  # alertmanager.yml still has REPLACE_WITH_... placeholders — see
  # infrastructure/monitoring/README.md for the env-substitution pattern.
  prometheus:
    image: prom/prometheus:v2.54.1
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - backend
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  alertmanager:
    image: prom/alertmanager:v0.27.0
    restart: always
    volumes:
      # Wave 8: the RUNTIME config is server-only (real Telegram secrets;
      # created from the repo template — see the template header). rsync
      # never touches it because the path doesn't exist in the repo.
      - ./monitoring/alertmanager/alertmanager.runtime.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    ports:
      - "127.0.0.1:9093:9093"
    networks:
      - backend
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    restart: always
    privileged: true
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    ports:
      - "127.0.0.1:8080:8080"
    networks:
      - backend
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.15.0
    restart: always
    environment:
      DATA_SOURCE_NAME: "postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/postgres?sslmode=disable"
      PG_EXPORTER_EXTEND_QUERY_PATH: /etc/postgres-exporter/queries.yml
    volumes:
      - ./monitoring/postgres-exporter/queries.yml:/etc/postgres-exporter/queries.yml:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis-exporter:
    image: oliver006/redis_exporter:v1.62.0
    restart: always
    environment:
      REDIS_ADDR: "redis://redis:6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - backend
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  grafana:
    image: grafana/grafana:11.2.0
    restart: always
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "https://grafana.octavo.press"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "127.0.0.1:3003:3000"
    depends_on:
      - prometheus
    networks:
      - backend
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  frontend:
  backend:

volumes:
  n8n_data:
  postgres_data:
  redis_data:
  prometheus_data:
  alertmanager_data:
  grafana_data:
  # Wave 2: rent model artifacts — retrain writes, serving reads.
  ml_models:
