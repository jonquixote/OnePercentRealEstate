services:
  app:
    build:
      context: ../
      dockerfile: Dockerfile
      args:
        # Next.js inlines NEXT_PUBLIC_* into the client bundle at build
        # time, so the value at runtime is irrelevant. The .env* files
        # are excluded by .dockerignore to keep secrets out of the image,
        # so we must pass the public mapbox token explicitly.
        NEXT_PUBLIC_MAPBOX_TOKEN: ${NEXT_PUBLIC_MAPBOX_TOKEN}
    restart: always
    ports:
      - "3001:3000"
    env_file:
      - ../.env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/postgres
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - frontend
      - backend
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  n8n:
    image: n8nio/n8n:1.85.0
    restart: always
    ports:
      - "5678:5678"
    env_file:
      - ../.env
    environment:
      - N8N_HOST=n8n.octavo.press
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD}
      - N8N_USER_MANAGEMENT_DISABLED=false
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - N8N_INITIAL_USER_EMAIL=${N8N_USER_EMAIL}
      - N8N_INITIAL_USER_PASSWORD=${N8N_PASSWORD}
      - N8N_INITIAL_USER_FIRST_NAME=Admin
      - N8N_INITIAL_USER_LAST_NAME=OnePercent
      - NODE_ENV=production
      - WEBHOOK_URL=https://n8n.octavo.press/
      - GENERIC_TIMEZONE=America/New_York
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_PASSWORD=${N8N_PASSWORD}
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - frontend
      - backend
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  postgres:
    image: postgis/postgis:16-3.4-alpine
    restart: always
    env_file:
      - ../.env
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../init-scripts:/docker-entrypoint-initdb.d
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  scraper:
    build: ../services/scraper_service
    restart: always
    ports:
      - "127.0.0.1:8001:8000"
    env_file:
      - ../.env
    environment:
      - PORT=8000
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/postgres
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:alpine
    restart: always
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD}
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  two:
    build:
      context: ../
      dockerfile: apps/two/Dockerfile
    restart: always
    ports:
      - "3002:3000"
    env_file:
      - ../.env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/postgres
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - frontend
      - backend
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Wave 2: crawl-job worker. Subscribes to PG NOTIFY crawl_job_enqueued
  # (trigger added in migration 2026_06_03_crawl_jobs_notify.sql) and
  # processes claimed rows via the FastAPI scraper service. Replaces
  # n8n's 30s polling Cron node; n8n owns scheduling, not draining.
  worker:
    build:
      context: ../
      dockerfile: apps/worker/Dockerfile
    restart: always
    env_file:
      - ../.env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/postgres
      - SCRAPER_URL=http://scraper:8000
      - WORKER_CONCURRENCY=2
      - LOG_LEVEL=info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Wave 2: cluster MV refresher. REFRESH MATERIALIZED VIEW CONCURRENTLY
  # mv_cluster_tiles every 10 min. Same image as `worker`, different CMD.
  worker-refresh:
    build:
      context: ../
      dockerfile: apps/worker/Dockerfile
    restart: always
    env_file:
      - ../.env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/postgres
      - SCRAPER_URL=http://scraper:8000
      - CLUSTER_REFRESH_INTERVAL_MS=600000
      - LOG_LEVEL=info
    command: ["node", "apps/worker/dist/refresh-clusters.js"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Wave 3: async rent estimator. LISTEN rent_job_enqueued, POST to
  # services/ml /predict, write back estimated_rent + rent_model_version
  # + rent_calc_status. Same image as `worker`, different CMD.
  worker-rent:
    build:
      context: ../
      dockerfile: apps/worker/Dockerfile
    restart: always
    env_file:
      - ../.env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/postgres
      - ML_URL=http://ml:8100
      - RENT_BACKFILL_BATCH=50
      - RENT_WORKER_CONCURRENCY=4
      - LOG_LEVEL=info
    command: ["node", "apps/worker/dist/rent-estimator.js"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: '0.5'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Wave 3: rent triangulation FastAPI shim. Imports services/rent_estimator_v2
  # (legacy math) + stamps active rent_models version onto each prediction.
  ml:
    build:
      # Dockerfile copies services/rent_estimator_v2.py and services/ml/ —
      # context must be the repo root so those paths resolve.
      context: ../
      dockerfile: services/ml/Dockerfile
    restart: always
    env_file:
      - ../.env
    environment:
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/postgres
      - ML_PORT=8100
    expose:
      - "8100"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: '1'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  pg_tileserv:
    image: pramsey/pg_tileserv:latest
    restart: always
    env_file:
      - ../.env
    environment:
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@postgres/postgres
    ports:
      - "127.0.0.1:7800:7800"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  frontend:
  backend:

volumes:
  n8n_data:
  postgres_data:
  redis_data:
