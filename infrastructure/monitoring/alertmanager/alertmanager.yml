# Alertmanager config TEMPLATE for OnePercentRealEstate.
#
# ── Telegram is the alert channel (owner decision 2026-07-07) ────────────
# THIS FILE IS A TEMPLATE. The live config is a SERVER-ONLY file at
#   /opt/onepercent/infrastructure/monitoring/alertmanager/alertmanager.runtime.yml
# (mounted by docker-compose; it does not exist in the repo, so rsync can
# never clobber it and secrets never land in git — a real bot token was
# committed once on 2026-07-07 and had to be revoked. Don't repeat that.)
#
# To (re)create the runtime file: copy this template, replace the two
# placeholders below with the real values, save it AT THE RUNTIME PATH, and
#   ./infrastructure/deploy.sh restart alertmanager
#
# Getting the two values (~2 min):
#   1. @BotFather -> /newbot (or /revoke + /token for an existing bot)
#      TELEGRAM_BOT_TOKEN=<from @BotFather — server runtime file only, never commit>
#   2. Add the bot to your chat, then read the chat id from
#      https://api.telegram.org/bot<TOKEN>/getUpdates
#      TELEGRAM_CHAT_ID=<integer chat id — server runtime file only>
# NOTE: alertmanager yaml does NOT expand $ENV_VARS — values must be
# literal in the runtime file (which is why it stays server-only).

global:
  resolve_timeout: 5m

route:
  receiver: tg-default
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - matchers:
        - severity = "crit"
      receiver: tg-crit
      group_wait: 10s
      repeat_interval: 1h
      continue: false

receivers:
  - name: tg-default
    telegram_configs:
      - bot_token: 'REPLACE_WITH_TELEGRAM_BOT_TOKEN'
        chat_id: -1  # REPLACE_WITH_TELEGRAM_CHAT_ID (integer)
        api_url: https://api.telegram.org
        parse_mode: HTML
        send_resolved: true
        message: |
          <b>[onepercent {{ .Status | toUpper }}]</b> {{ .CommonLabels.alertname }}
          {{ range .Alerts }}{{ .Annotations.summary }}
          {{ .Annotations.description }}
          {{ end }}

  - name: tg-crit
    telegram_configs:
      - bot_token: 'REPLACE_WITH_TELEGRAM_BOT_TOKEN'
        chat_id: -1  # REPLACE_WITH_TELEGRAM_CHAT_ID (integer)
        api_url: https://api.telegram.org
        parse_mode: HTML
        send_resolved: true
        message: |
          <b>🔴 [onepercent CRIT {{ .Status | toUpper }}]</b> {{ .CommonLabels.alertname }}
          {{ range .Alerts }}{{ .Annotations.summary }}
          {{ .Annotations.description }}
          {{ end }}

inhibit_rules:
  # If a service is down (crit), don't also page about high error rate
  # / latency on that service — they're caused by the down-ness.
  - source_matchers:
      - severity = "crit"
      - alertname =~ "PostgresDown|RedisDown"
    target_matchers:
      - severity = "warn"
    equal: ["host"]
