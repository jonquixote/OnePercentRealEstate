# Grafana datasource provisioning.
#
# Drop-in: this file goes at
#   /etc/grafana/provisioning/datasources/prometheus.yml
# inside the grafana container. We achieve that via a compose bind
# mount (see ../../../README.md).

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    # Host networking (post-systemd cutover): prometheus binds 127.0.0.1:9090
    # and grafana shares the host netns, so loopback is the right address.
    url: http://127.0.0.1:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: 30s
      httpMethod: POST
