# Grafana datasource provisioning.
#
# Drop-in: this file goes at
#   /etc/grafana/provisioning/datasources/prometheus.yml
# inside the grafana container. We achieve that via a compose bind
# mount (see ../../../README.md).

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: 30s
      httpMethod: POST
