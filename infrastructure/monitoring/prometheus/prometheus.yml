  #     - targets:
  #         - app:3000
  #       labels:
  #         host: onepercent-prod
  #         app: one
  #
  # - job_name: two-app
  #   metrics_path: /api/metrics
  #   static_configs:
  #     - targets:
  #         - two-app:3000
