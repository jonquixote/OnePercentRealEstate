# Prometheus scrape config for the OnePercentRealEstate stack.
#
# This file is consumed by the `prometheus` container once monitoring
# is wired into infrastructure/docker-compose.yml. See ../README.md.
#
# Conventions:
#   * Host-side exporters (node, cadvisor) reach the host via
#     host.docker.internal — works on Linux 24.04 with Docker 24+
#     when the prometheus container is started with
#     `--add-host=host.docker.internal:host-gateway`.
#   * Container-side exporters (postgres, redis) are reached by their
#     compose service names on the `backend` network.

global:
  scrape_interval: 30s
  scrape_timeout: 10s
  evaluation_interval: 30s
  external_labels:
    monitor: onepercent-prod
    env: production

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  - job_name: node
    # Host-level CPU / memory / disk / network
    static_configs:
      - targets:
          - host.docker.internal:9100
        labels:
          host: onepercent-prod

  - job_name: cadvisor
    # Per-container CPU / memory / network / disk
    static_configs:
      - targets:
          - cadvisor:8080
        labels:
          host: onepercent-prod

  - job_name: postgres
    static_configs:
      - targets:
          - postgres-exporter:9187
        labels:
          host: onepercent-prod
          db: postgres

  - job_name: redis
    static_configs:
      - targets:
          - redis-exporter:9121
        labels:
          host: onepercent-prod

  # TODO(wave-7.next): once apps/one and apps/two expose
