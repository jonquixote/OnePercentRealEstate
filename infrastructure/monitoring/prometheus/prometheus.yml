# Prometheus scrape config for the OnePercentRealEstate stack.
#
# This file is consumed by the `prometheus` container once monitoring
# is wired into infrastructure/docker-compose.yml. See ../README.md.
#
# Conventions (post-systemd cutover, 2026-07-09):
#   * Every monitoring container runs with network_mode: host and binds
#     127.0.0.1 only, so all scrape targets are plain loopback ports.
#   * App services (ML, workers, apps, postgres, redis) are systemd host
#     processes — node-exporter is what covers their resource usage;
#     cadvisor only sees the monitoring containers themselves.

global:
  scrape_interval: 30s
  scrape_timeout: 10s
  evaluation_interval: 30s
  external_labels:
    monitor: onepercent-prod
    env: production

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - 127.0.0.1:9093

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - 127.0.0.1:9090

  - job_name: node
    # Host-level CPU / memory / disk / network — the primary resource view
    # now that app services are systemd host processes.
    static_configs:
      - targets:
          - 127.0.0.1:9100
        labels:
          host: onepercent-prod

  - job_name: cadvisor
    # Per-container CPU / memory / network / disk (monitoring stack only)
    static_configs:
      - targets:
          - 127.0.0.1:8080
        labels:
          host: onepercent-prod

  - job_name: postgres
    static_configs:
      - targets:
          - 127.0.0.1:9187
        labels:
          host: onepercent-prod
          db: postgres

  - job_name: redis
    static_configs:
      - targets:
          - 127.0.0.1:9121
        labels:
          host: onepercent-prod

  # TODO(wave-7.next): once apps/one and apps/two expose
  # /api/metrics (prom-client), un-comment and point at them. The Next
  # app listens on 3000 inside the container; the compose published
  # port is 3001 on the host. Inside the prometheus container we hit
  # the service name directly.
