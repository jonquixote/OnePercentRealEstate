# Prometheus alert rules for OnePercentRealEstate production.
#
# Severities:
#   warn  - notify, no pager
#   crit  - pager (when on-call exists; today routes to extra Slack chan)
#
# Each rule includes a runbook_url annotation pointing at
# documentation/operations/. Fill those in as runbooks are written.

groups:
  - name: host
    interval: 30s
    rules:
      - alert: HighCPU
        expr: |
          100 - (avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 90
        for: 5m
        labels:
          severity: warn
        annotations:
          summary: "CPU > 90% for 5m on {{ $labels.instance }}"
          description: "Sustained high CPU. Identify the hot container via cadvisor."
          runbook_url: "https://github.com/<OWNER>/OnePercentRealEstate/blob/main/documentation/operations/troubleshooting.md"

      - alert: HighMemory
        expr: |
          (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 90
        for: 5m
        labels:
          severity: warn
        annotations:
          summary: "Memory > 90% for 5m on {{ $labels.instance }}"
          description: "Available memory below 10%. Check the largest container via cadvisor; consider raising limits or restarting."

      - alert: DiskWarn
        expr: |
          (1 - (node_filesystem_avail_bytes{fstype!~"tmpfs|overlay"} / node_filesystem_size_bytes{fstype!~"tmpfs|overlay"})) * 100 > 85
        for: 10m
        labels:
          severity: warn
        annotations:
          summary: "Disk > 85% on {{ $labels.mountpoint }}"
          description: "Free space dropping. Rotate logs or expand the volume before it hits crit."

      - alert: DiskCrit
        expr: |
          (1 - (node_filesystem_avail_bytes{fstype!~"tmpfs|overlay"} / node_filesystem_size_bytes{fstype!~"tmpfs|overlay"})) * 100 > 95
        for: 5m
        labels:
          severity: crit
        annotations:
          summary: "Disk > 95% on {{ $labels.mountpoint }}"
          description: "Filesystem nearly full. Postgres will start refusing writes. Expand or evict NOW."

  - name: services
    interval: 30s
    rules:
      - alert: PostgresDown
        expr: pg_up == 0
        for: 1m
        labels:
          severity: crit
        annotations:
          summary: "Postgres is unreachable"
          description: "postgres-exporter cannot connect. Check `docker ps` and `docker logs infrastructure-postgres-1`."

      - alert: RedisDown
        expr: redis_up == 0
        for: 1m
        labels:
          severity: crit
        annotations:
          summary: "Redis is unreachable"
          description: "redis-exporter cannot connect. Rate limiting and session caches are unavailable."

  - name: http
    interval: 30s
    rules:
      # These rules assume the Next.js apps expose prom-client metrics
      # at /api/metrics with labels `app`, `route`, `status`. They will
      # not fire until those metrics exist; they're scaffolded now so
      # we don't lose the design.
      - alert: HttpHighErrorRate
        expr: |
          (
            sum by (app) (rate(http_requests_total{status=~"5.."}[5m]))
            /
            sum by (app) (rate(http_requests_total[5m]))
          ) > 0.05
        for: 5m
        labels:
          severity: warn
        annotations:
          summary: "5xx rate > 5% on {{ $labels.app }} for 5m"
          description: "Check app logs: `docker logs infrastructure-app-1 --tail 200`."

      - alert: HttpHighLatencyP95
        expr: |
          histogram_quantile(
            0.95,
            sum by (app, le) (rate(http_request_duration_seconds_bucket[5m]))
          ) > 0.5
        for: 5m
        labels:
          severity: warn
        annotations:
          summary: "p95 latency > 500ms on {{ $labels.app }} for 5m"
          description: "Inspect slow endpoints via Grafana 'HTTP latency by route'."

  - name: scraper
    interval: 60s
    rules:
      # ---------------------------------------------------------------
      # Smart crawler stall / block detector.
      #
      # Metrics come from the `crawler_health` custom query in
      # postgres-exporter's queries.yml. Tiers, escalating:
      #
      #   liveness   CrawlerNoProgress   crit  worker/tunnel down
      #   stall      CrawlerStalling     warn  a few misses in a row
      #   stall      CrawlerNoFreshData  warn  no new data for a while
      #   early      CrawlerAuthErrors   warn  first block-like errors
      #   block      CrawlerLikelyBlocked crit dozens of misses in a row
      #   block      CrawlerBlockedAuth  crit  auth/401/403/429 fingerprint
      #
      # Inhibit rules (below) suppress the softer stall/early alerts once a
      # block-level alert fires, so a real block pages once, cleanly.
      # ---------------------------------------------------------------

      # Worker is finishing NOTHING while a backlog exists → it's down, or
      # the scraper box / DB reverse-tunnel is down. (pending is normally
      # huge here — the full-US seed — so its presence is the gate, not the size.)
      # Both series come from the same crawler_health row (identical labels), so
      # `and` matches them directly without on()/ignoring().
      - alert: CrawlerNoProgress
        expr: crawler_health_finished_5m == 0 and crawler_health_pending > 0
        for: 15m
        labels:
          severity: crit
        annotations:
          summary: "Crawler finished 0 jobs in 5m (backlog present)"
          description: "No crawl_jobs have completed/failed for 15m while pending work exists. Check oper-worker on main and oper-scraper + the SSH DB tunnel on the scraper box."
          runbook_url: "https://github.com/<OWNER>/OnePercentRealEstate/blob/main/documentation/operations/troubleshooting.md"

      # A few misses in a row AND recent yield has genuinely dropped. The
      # data_30m guard stops this warn-ing every time the recycle loop passes
      # through a barren/rural cluster of ZIPs while the pipeline is otherwise
      # healthy (data_30m stays high in that case).
      - alert: CrawlerStalling
        expr: crawler_health_miss_streak >= 12 and crawler_health_finished_5m > 0 and crawler_health_data_30m < 20
        for: 10m
        labels:
          severity: warn
        annotations:
          summary: "Crawler stalling: {{ $value }} consecutive jobs with no data + low yield"
          description: "A run of finished jobs produced 0 listings and overall 30m data yield is low. Could be an early upstream problem — watch for escalation to CrawlerLikelyBlocked."

      # Jobs are finishing but the pipeline hasn't produced ANY new data in
      # a while — a subtler stall than the streak (e.g. all recent ZIPs empty).
      - alert: CrawlerNoFreshData
        expr: crawler_health_secs_since_data > 2700 and crawler_health_finished_5m > 0
        for: 5m
        labels:
          severity: warn
        annotations:
          summary: "No new listings ingested for {{ $value | humanizeDuration }}"
          description: "The crawler is running but hasn't inserted data in >45m. Check upstream availability and recent scrape warnings in oper-worker logs."

      # First block-like errors appear — heads-up BEFORE it becomes a full
      # block. This is the exact fingerprint of the 2026-07-09 incident.
      - alert: CrawlerAuthErrors
        expr: crawler_health_auth_fail_15m >= 1
        for: 2m
        labels:
          severity: warn
        annotations:
          summary: "Crawler auth/block errors appearing: {{ $value }} in 15m"
          description: "Recent scrape failures match an auth/401/403/429/captcha fingerprint. Realtor.com may be starting to throttle the scraper IP. If this climbs, CrawlerBlockedAuth will page."

      # Block fingerprint: either a sustained run of hard failures, OR a long
      # miss streak WHILE throughput is high and yield is zero. The second
      # clause is what distinguishes a real block from the crawler merely
      # cycling through a barren/rural cluster of ZIPs (normal, given the
      # recycle loop): only alert when lots of jobs finished recently but
      # NONE produced data.
      - alert: CrawlerLikelyBlocked
        expr: |
          crawler_health_fail_streak >= 20
          or (
            crawler_health_miss_streak >= 50
            and crawler_health_finished_30m > 50
            and crawler_health_data_30m == 0
          )
        for: 5m
        labels:
          severity: crit
        annotations:
          summary: "Crawler likely BLOCKED (miss/fail streak with zero yield)"
          description: "Sustained hard-failures, or dozens of consecutive misses while lots of jobs finished but produced ZERO data in 30m — the pattern of an upstream IP block (see 2026-07-09). Rotate the scraper egress IP / move to a fresh scraper box before more damage."
          runbook_url: "https://github.com/<OWNER>/OnePercentRealEstate/blob/main/documentation/operations/troubleshooting.md"

      # Definitive block fingerprint at volume — page immediately.
      - alert: CrawlerBlockedAuth
        expr: crawler_health_auth_fail_15m >= 3
        for: 2m
        labels:
          severity: crit
        annotations:
          summary: "Crawler BLOCKED (auth): {{ $value }} auth/block failures in 15m"
          description: "Multiple scrape failures match auth/401/403/429/captcha in 15m — upstream is blocking the scraper IP. This is the failure mode that took the crawler down on 2026-07-09. Stop hammering, rotate the egress IP / scraper box."
          runbook_url: "https://github.com/<OWNER>/OnePercentRealEstate/blob/main/documentation/operations/troubleshooting.md"

      # Authoritative block signal since 2026-07-15: the crawl worker's circuit
      # breaker RE-PENDS blocked jobs (so ZIPs retry after the block lifts)
      # rather than leaving them 'failed', which keeps them OUT of the
      # auth_fail_15m fingerprint above. When the breaker trips it records a
      # cool-off in crawler_block_state → block_cooloff_active = 1 here. This is
      # now the primary "crawler is blocked" page; the auth_fail rules remain as
      # a backstop for blocks that slip through as hard failures.
      - alert: CrawlerBlockCooloff
        expr: crawler_health_block_cooloff_active == 1
        for: 1m
        labels:
          severity: crit
        annotations:
          summary: "Crawler BLOCKED — circuit breaker in cool-off"
          description: "The crawl worker detected an upstream Realtor.com block and PAUSED (cool-off, exponential backoff). Crawling auto-resumes with a probe when the block lifts. If this persists across cool-offs, wait it out or rotate the scraper egress IP / scraper box."
          runbook_url: "https://github.com/<OWNER>/OnePercentRealEstate/blob/main/documentation/operations/troubleshooting.md"

      - alert: RentalIngestStalled
        expr: (sum(rental_ingest_by_source_last24h) or absent(sum(rental_ingest_by_source_last24h))) < 100
        for: 6h
        labels:
          severity: warn
        annotations:
          summary: "Rental ingest below 100/day for 6h"
          description: "Total rental listings in last 24h is {{ $value }}. Pipeline may be sick — check scraper logs and upstream availability."


# ---------------------------------------------------------------------------
# postgres-exporter custom query (paste into postgres-exporter's
# queries.yml; do NOT put this inside the Prometheus rules file).
# ---------------------------------------------------------------------------
#
# crawl_jobs:
#   query: |
#     SELECT
#       count(*) FILTER (WHERE status = 'pending') AS pending,
#       count(*) FILTER (WHERE status = 'running') AS running,
#       count(*) FILTER (WHERE status = 'failed' AND updated_at > now() - interval '1 hour') AS failed_recent
#     FROM crawl_jobs
#   metrics:
#     - pending:
#         usage: "GAUGE"
#         description: "Pending crawl jobs"
#     - running:
#         usage: "GAUGE"
#         description: "Currently running crawl jobs"
#     - failed_recent:
#         usage: "GAUGE"
#         description: "Crawl jobs that failed in the last hour"
#
# This becomes the metric `crawl_jobs_pending` etc. referenced above.
