# Custom Postgres metrics for postgres-exporter. The default metric set
# covers core server stats; this file adds OnePercentRealEstate-specific
# gauges that the alert rules reference.
#
# Mounted into postgres-exporter via the compose snippet in
# infrastructure/monitoring/README.md.

crawl_jobs_status:
  query: |
    SELECT
      status,
      COUNT(*)::float AS count
    FROM crawl_jobs
    GROUP BY status
  master: true
  metrics:
    - status:
        usage: "LABEL"
        description: "Crawl job status (pending|processing|completed|failed)"
    - count:
        usage: "GAUGE"
        description: "Number of crawl jobs in the given status"

rent_calc_status:
  query: |
    SELECT
      rent_calc_status AS status,
      COUNT(*)::float AS count
    FROM listings
    GROUP BY rent_calc_status
  master: true
  metrics:
    - status:
        usage: "LABEL"
        description: "Async rent calc status (pending|done|failed)"
    - count:
        usage: "GAUGE"
        description: "Number of listings in the given rent_calc_status"

listings_total:
  query: "SELECT COUNT(*)::float AS count FROM listings"
  master: true
  metrics:
    - count:
        usage: "GAUGE"
        description: "Total rows in the listings table"

rental_ingest_by_source:
  query: |
    SELECT
      source,
      COUNT(*) FILTER (WHERE listing_date > now() - interval '24 hours')::float AS last24h
    FROM rental_listings
    GROUP BY source
  master: true
  metrics:
    - source:
        usage: "LABEL"
        description: "Rental data source (homeharvest, padmapper, etc.)"
    - last24h:
        usage: "GAUGE"
        description: "Number of rental listings ingested in the last 24 hours from this source"

# --- Added 2026-07-12 for Phase O observability (pg_stat_statements + auto_explain) ---
# See ops/systemd/postgres-tuning.md. Restart postgres-exporter after editing.

pg_stat_statements_top:
  # Aggregate by queryid: the same normalized query runs under multiple
  # roles (oper_app/worker/postgres → same queryid, different userid), so a
  # bare SELECT yields duplicate (queryid) label sets and the exporter fails
  # the WHOLE scrape with 500 "collected before". GROUP BY makes queryid
  # unique; mean is call-weighted across roles.
  query: |
    SELECT
      queryid::text AS queryid,
      round(sum(mean_exec_time * calls) / NULLIF(sum(calls), 0))::float AS mean_exec_ms,
      sum(calls)::float AS calls,
      sum(rows)::float AS rows
    FROM pg_stat_statements
    WHERE queryid IS NOT NULL
    GROUP BY queryid
    ORDER BY sum(mean_exec_time * calls) / NULLIF(sum(calls), 0) DESC
    LIMIT 10
  master: true
  metrics:
    - queryid:
        usage: "LABEL"
        description: "pg_stat_statements queryid (top 10 by mean execution time)"
    - mean_exec_ms:
        usage: "GAUGE"
        description: "Mean execution time in ms for the query"
    - calls:
        usage: "GAUGE"
        description: "Number of times the query was executed"
    - rows:
        usage: "GAUGE"
        description: "Total rows retrieved or affected by the query"

cache_hit_ratio:
  query: |
    SELECT
      CASE
        WHEN sum(blks_hit) + sum(blks_read) = 0 THEN 1.0
        ELSE sum(blks_hit) / (sum(blks_hit) + sum(blks_read))
      END AS ratio
    FROM pg_stat_database
    WHERE datname = current_database()
  master: true
  metrics:
    - ratio:
        usage: "GAUGE"
        description: "Buffer cache hit ratio (0-1) for the current database"

connections_by_state:
  query: |
    SELECT
      COALESCE(state, 'idle') AS state,
      COUNT(*)::float AS count
    FROM pg_stat_activity
    WHERE backend_type = 'client backend'
    GROUP BY state
  master: true
  metrics:
    - state:
        usage: "LABEL"
        description: "Client backend connection state (active|idle|idle in transaction|etc.)"
    - count:
        usage: "GAUGE"
        description: "Number of connections in that state"

table_dead_tuple_ratio:
  query: |
    SELECT
      relname,
      CASE WHEN (n_live_tup + n_dead_tup) = 0 THEN 0.0
           ELSE n_dead_tup::float / (n_live_tup + n_dead_tup)
      END AS dead_ratio
    FROM pg_stat_user_tables
  master: true
  metrics:
    - relname:
        usage: "LABEL"
        description: "User table name"
    - dead_ratio:
        usage: "GAUGE"
        description: "Fraction of dead tuples (0-1) — proxy for table bloat / vacuum lag"

# --- Added 2026-07-14: smart crawler stall / block detector ---
# One row, many gauges → metrics `crawler_health_<column>`. Powers the
# CrawlerStalling / CrawlerLikelyBlocked / CrawlerBlockedAuth rules.
#
# Signal design (why these columns):
#   * A "miss" = a finished job that produced no data (listings_found = 0)
#     OR failed. A few misses in a row = a STALL. Many dozen consecutive
#     misses = statistically impossible when healthy → likely an IP BLOCK.
#   * Failures (status='failed') are strictly worse than empties: an empty
#     ZIP can be legitimately barren, a failure means the scrape errored.
#   * auth_fail_15m matches the exact fingerprint of the incident that
#     started all this (Realtor.com AuthenticationError / 401/403/429).
#     That is the fastest, highest-confidence block signal.
# The streak scans are bounded to the 800 most-recent finished jobs
# (supported by idx_crawl_jobs_finished_at) so cost stays flat as the
# table grows; crit thresholds sit well under that cap.
crawler_health:
  query: |
    WITH recent AS (
      SELECT id, status, COALESCE(listings_found, 0) AS found, finished_at
      FROM crawl_jobs
      WHERE finished_at IS NOT NULL AND status IN ('completed', 'failed')
      ORDER BY finished_at DESC, id DESC
      LIMIT 800
    ),
    ord AS (
      SELECT status, found,
             ROW_NUMBER() OVER (ORDER BY finished_at DESC, id DESC) AS rn
      FROM recent
    )
    SELECT
      -- liveness: jobs finishing recently
      (SELECT count(*) FROM crawl_jobs
         WHERE finished_at > now() - interval '5 minutes'
           AND status IN ('completed','failed'))::float          AS finished_5m,
      (SELECT count(*) FROM crawl_jobs
         WHERE finished_at > now() - interval '30 minutes'
           AND status IN ('completed','failed'))::float          AS finished_30m,
      -- yield: jobs that actually produced data in the last 30m
      (SELECT count(*) FROM crawl_jobs
         WHERE finished_at > now() - interval '30 minutes'
           AND status = 'completed' AND COALESCE(listings_found,0) > 0)::float
                                                                  AS data_30m,
      -- consecutive most-recent misses (0-data or failed) before first data hit
      COALESCE(
        (SELECT min(rn) FILTER (WHERE status = 'completed' AND found > 0) FROM ord) - 1,
        (SELECT count(*) FROM ord)
      )::float                                                    AS miss_streak,
      -- consecutive most-recent hard failures before first non-failure
      COALESCE(
        (SELECT min(rn) FILTER (WHERE status <> 'failed') FROM ord) - 1,
        (SELECT count(*) FROM ord)
      )::float                                                    AS fail_streak,
      -- direct block fingerprint in recent failures
      (SELECT count(*) FROM crawl_jobs
         WHERE status = 'failed'
           AND finished_at > now() - interval '15 minutes'
           AND COALESCE(error_message, '') ~* '(authenticat|unauthor|forbidden|captcha|blocked|access denied|rate.?limit|too many request|\y(401|403|429)\y)')::float
                                                                  AS auth_fail_15m,
      -- seconds since the crawler last produced ANY data
      COALESCE(
        EXTRACT(EPOCH FROM (now() - (
          SELECT max(finished_at) FROM crawl_jobs
          WHERE status = 'completed' AND COALESCE(listings_found,0) > 0
        ))),
        999999
      )::float                                                    AS secs_since_data,
      -- breaker-authored block signal: 1 while the worker's circuit breaker is
      -- in a block cool-off. Authoritative now that blocked jobs are RE-PENDED
      -- (not 'failed'), which keeps them out of the auth_fail_15m fingerprint.
      COALESCE(
        (SELECT CASE WHEN cooloff_until IS NOT NULL AND cooloff_until > now()
                     THEN 1 ELSE 0 END
           FROM crawler_block_state WHERE id = 1),
        0
      )::float                                                    AS block_cooloff_active
  master: true
  metrics:
    - finished_5m:
        usage: "GAUGE"
        description: "Crawl jobs finished (completed|failed) in the last 5 minutes — liveness"
    - finished_30m:
        usage: "GAUGE"
        description: "Crawl jobs finished in the last 30 minutes"
    - data_30m:
        usage: "GAUGE"
        description: "Crawl jobs that produced data (>0 listings) in the last 30 minutes"
    - miss_streak:
        usage: "GAUGE"
        description: "Consecutive most-recent finished jobs with no data or failed (stall/block core signal)"
    - fail_streak:
        usage: "GAUGE"
        description: "Consecutive most-recent finished jobs that hard-failed"
    - auth_fail_15m:
        usage: "GAUGE"
        description: "Failed jobs in last 15m whose error matches an auth/block fingerprint (401/403/429/captcha/blocked)"
    - secs_since_data:
        usage: "GAUGE"
        description: "Seconds since the crawler last produced any data"
    - block_cooloff_active:
        usage: "GAUGE"
        description: "1 while the crawl worker's circuit breaker is in a block cool-off (upstream block detected, crawling paused)"

