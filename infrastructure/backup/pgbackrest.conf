# pgbackrest configuration for OnePercentRealEstate production
#
# This file is safe to commit. Secrets (S3 application keys) MUST NOT live
# here. Use one of these two patterns instead:
#
#   1. Drop a `pgbackrest.conf.local` next to this file with just the
#      [global] block holding `repo1-s3-key` and `repo1-s3-key-secret`,
#      mode 0600, owned by the postgres user (or root if pgbackrest runs
#      as root). pgbackrest's `--config-include-path=/etc/pgbackrest/conf.d`
#      will merge it.
#
#   2. Export PGBACKREST_REPO1_S3_KEY / PGBACKREST_REPO1_S3_KEY_SECRET in
#      the systemd unit's `Environment=` or `EnvironmentFile=` directive.
#      pgbackrest reads these as overrides for the matching config keys.
#
# On the host, this file should be installed at:
#   /etc/pgbackrest/pgbackrest.conf  (mode 0640, owned by the pgbackrest
#                                     user, group postgres)
#
# See infrastructure/backup/setup-pgbackrest.md for the full install
# walkthrough.

[global]
# --- Repository (where backups live) ---------------------------------------
repo1-type=s3
repo1-path=/pgbackrest
repo1-retention-full=7
repo1-retention-archive=30
repo1-cipher-type=aes-256-cbc
# repo1-cipher-pass is required when cipher-type is set. Generate once with:
#   openssl rand -base64 48
# and store it in pgbackrest.conf.local. DO NOT commit it.
# repo1-cipher-pass=<set in pgbackrest.conf.local>

# Backblaze B2 (S3-compatible). Adjust region/endpoint if the bucket lives
# in a different B2 region (e.g. us-east-005 / eu-central-003).
repo1-s3-region=us-west-002
repo1-s3-endpoint=s3.us-west-002.backblazeb2.com
repo1-s3-bucket=octavo-pg-backups
# repo1-s3-key=          # set via env or pgbackrest.conf.local
# repo1-s3-key-secret=   # set via env or pgbackrest.conf.local
repo1-s3-uri-style=path

# --- Compression & performance ---------------------------------------------
compress-type=zst
compress-level=3
process-max=4
start-fast=y
delta=y

# --- WAL archiving ---------------------------------------------------------
archive-async=y
spool-path=/var/spool/pgbackrest

# --- Logging ---------------------------------------------------------------
log-level-console=info
log-level-file=detail
log-path=/var/log/pgbackrest

# ---------------------------------------------------------------------------
# Stanza: oper
# ---------------------------------------------------------------------------
# pg1-path is the in-container Postgres data directory. When pgbackrest
# runs on the *host* against a Dockerized Postgres, this path must match
# the volume mount on the host side (the docker volume `postgres_data` is
# mounted at /var/lib/docker/volumes/infrastructure_postgres_data/_data).
#
# Two ways to make /var/lib/postgresql/data resolvable on the host:
#
#   (a) Bind-mount the named volume to a stable host path in
#       docker-compose.yml (preferred):
#
#         volumes:
#           - /var/lib/postgresql/data:/var/lib/postgresql/data
#
#       Then pg1-path below works as-is.
#
#   (b) Leave the named volume and point pg1-path at the docker volume's
#       on-host location:
#
#         pg1-path=/var/lib/docker/volumes/infrastructure_postgres_data/_data
#
# We assume (a). Adjust if you keep the named volume.

[oper]
pg1-path=/var/lib/postgresql/data
pg1-port=5432
pg1-user=postgres
pg1-host-user=postgres
# pg1-host is intentionally omitted: pgbackrest connects via local socket
# to the postgres process running in the container's network namespace.
# If you run pgbackrest in a dedicated container, set pg1-host=postgres
# and pg1-host-port=5432.
