# Cache control for static assets
# Apply to versioned/hashed Next.js static files and image assets
# These files are immutable and safe to cache indefinitely

location ~* ^/_next/static/ {
    add_header Cache-Control "public, max-age=31536000, immutable" always;
}

location ~* \.(woff2?|jpg|jpeg|png|webp|avif|gif|svg|ico|css|js|map)$ {
    add_header Cache-Control "public, max-age=31536000, immutable" always;
}
