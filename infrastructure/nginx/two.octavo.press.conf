server {
    listen 80;
    listen [::]:80;
    server_name two.octavo.press;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Static asset caching (includes Next.js _next/static/ and image formats)
    include /etc/nginx/snippets/cache-static.conf;

    # Terminal's own APIs live on apps/two (port 3002). Route them there
    # before the generic /api/ catch-all (which proxies to apps/one/3001),
    # so screens, alerts, market series, and health checks hit the right app.
    location = /api/screens {
        include /etc/nginx/snippets/proxy-params.conf;
        proxy_pass http://127.0.0.1:3002;
        proxy_read_timeout 60s;
    }
    location = /api/screen-alerts {
        include /etc/nginx/snippets/proxy-params.conf;
        proxy_pass http://127.0.0.1:3002;
        proxy_read_timeout 60s;
    }
    location = /api/market-series {
        include /etc/nginx/snippets/proxy-params.conf;
        proxy_pass http://127.0.0.1:3002;
        proxy_read_timeout 60s;
    }
    location = /api/healthz {
        include /etc/nginx/snippets/proxy-params.conf;
        proxy_pass http://127.0.0.1:3002;
        proxy_read_timeout 60s;
    }
    location = /healthz {
        include /etc/nginx/snippets/proxy-params.conf;
        proxy_pass http://127.0.0.1:3002;
        proxy_read_timeout 60s;
    }

    location /api/ {
        include /etc/nginx/snippets/proxy-params.conf;
        proxy_pass http://127.0.0.1:3001;
        proxy_read_timeout 60s;
    }

    location / {
        include /etc/nginx/snippets/proxy-params.conf;
        proxy_pass http://127.0.0.1:3002;
        proxy_read_timeout 60s;
    }
}
