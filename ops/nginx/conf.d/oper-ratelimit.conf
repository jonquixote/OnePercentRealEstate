# Rate-limit zones for octavo.press (backend-db-hardening A1).
# Lives in /etc/nginx/conf.d/ (http context). Keys on client IP.
#
# auth:  5 req/min — login/signup brute-force protection
# api:   30 req/s steady, burst 60 — generous for legit app chatter
# tiles: 100 req/s, burst 200 — map panning is bursty by design
limit_req_zone $binary_remote_addr zone=oper_auth:10m  rate=5r/m;
limit_req_zone $binary_remote_addr zone=oper_api:10m   rate=30r/s;
limit_req_zone $binary_remote_addr zone=oper_tiles:10m rate=100r/s;
limit_req_status 429;

# Clients that get a 429 must learn how long to wait (plan A1 acceptance).
# Emits `Retry-After: 10` only on 429 responses; empty otherwise.
map $status $oper_retry_after {
    429 "10";
    default "";
}
add_header Retry-After $oper_retry_after always;
