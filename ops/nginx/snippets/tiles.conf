location /tiles/ {
    limit_req zone=oper_tiles burst=200 nodelay;

    proxy_pass http://127.0.0.1:7800/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    add_header 'Access-Control-Allow-Origin' '*' always;
    add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
    add_header 'Access-Control-Allow-Headers' 'Origin, Content-Type, Accept' always;

    add_header 'Cache-Control' 'public, max-age=300' always;

    # Re-emit Retry-After here: nginx only adds the http-context add_header
    # when a location defines NO add_header of its own, and this location does
    # (CORS/Cache-Control above). Without this, 429s from the tiles rate-limit
    # would lose Retry-After. $oper_retry_after is "" except on 429.
    add_header 'Retry-After' $oper_retry_after always;

    if ($request_method = 'OPTIONS') {
        add_header 'Access-Control-Allow-Origin' '*';
        add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS';
        add_header 'Access-Control-Allow-Headers' 'Origin, Content-Type, Accept';
        add_header 'Access-Control-Max-Age' 86400;
        add_header 'Content-Length' 0;
        return 204;
    }
}
